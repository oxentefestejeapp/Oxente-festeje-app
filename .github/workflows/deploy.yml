name: Deploy Oxente Festeje to Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: Build & Deploy Oxente Festeje
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm install
      
    - name: 🔨 Build Project
      run: npm run build
      
    - name: 🚀 Sync files via FTP to Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        # if your site is inside subfolder, you can change server-dir to e.g. /public_html/subfolder/
        server-dir: ./
