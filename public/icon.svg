<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    
    <!-- Brand Pink Glow Gradient -->
    <linearGradient id="pinkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#be185d" />
      <stop offset="50%" stop-color="#db2777" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>

    <!-- Warm Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>

    <!-- Soft Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#db2777" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Base Rounded Square Background for PWA Maskable Icon compliance -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Elegant Gold Ring Accent -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-opacity="0.15" />

  <!-- Styled Festive Icon Core Group with Shadow Glow -->
  <g filter="url(#glow)" transform="translate(256, 240)">
    <!-- Main Balloon / Party Bloom Icon shapes -->
    <ellipse cx="-40" cy="-20" rx="60" ry="75" fill="url(#pinkGrad)" opacity="0.95" transform="rotate(-15)" />
    <ellipse cx="40" cy="-20" rx="55" ry="70" fill="url(#goldGrad)" opacity="0.85" transform="rotate(15)" />
    <ellipse cx="0" cy="-45" rx="65" ry="80" fill="url(#pinkGrad)" />
    
    <!-- Balloon Nodes and String Lines -->
    <path d="M-45,50 Q-30,110 5,140" fill="none" stroke="#52525b" stroke-width="4" stroke-linecap="round" />
    <path d="M40,45 Q20,105 -5,140" fill="none" stroke="#52525b" stroke-width="4" stroke-linecap="round" opacity="0.7" />
    <path d="M0,35 L0,140" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Decorative Stars / Sparkles -->
    <path d="M-110,-110 L-100,-110 L-100,-120 L-90,-110 L-80,-110 L-90,-100 L-90,-90 L-100,-100 Z" fill="url(#goldGrad)" />
    <path d="M120,-70 L126,-70 L126,-76 L132,-70 L138,-70 L132,-64 L132,-58 L126,-64 Z" fill="url(#pinkGrad)" />
    <circle cx="85" cy="85" r="8" fill="url(#goldGrad)" />
    <circle cx="-95" cy="40" r="12" fill="url(#pinkGrad)" />
  </g>

  <!-- Subtle bottom decorative text line with Oxente style -->
  <text x="256" y="445" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="900" fill="url(#pinkGrad)" letter-spacing="10" text-anchor="middle">OXENTE</text>
</svg>
